<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="title">الكيمياء التطبيقية الصناعية</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/darkmode.css" id="dark-mode-stylesheet" disabled>
    <link rel="stylesheet" href="./css/lightmode.css" id="light-mode-stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">


</head>
<body class="dark-mode">
    <header>
        <div class="header-container">
            <button id="theme-toggle" class="icon-button">
                <i id="darkModeIcon" class="fas fa-moon"></i>
            </button>            
            <div class="language-dropdown">
                <button id="language-button" class="icon-button">
                    <i class="fas fa-globe"></i> العربية
                </button>
                <div class="dropdown-menu">
                    <button id="arabic-btn">العربية</button>
                    <button id="english-btn">English</button>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="container-box">
            <div class="box-logo">
                <img src="logo.png" alt="Logo">
            </div>
            <div class="box-title">
                <h1 data-translate="title">الكيمياء التطبيقية الصناعية</h1>
                <span data-translate="description">كلية العلوم - جامعة الزقازيق</span>
            </div>
        </div>
        
        <div class="card">
            <div class="card-content">
                <a href="http://www.militaryeducation.zu.edu.eg/Views/General/GetStudInfo" class="card-link" target="_blank">
                    <i class="fas fa-user"></i>
                    <span data-translate="studentNumber">الحصول على كود الطالب</span>
                </a>
                <button class="share-button"><i class="fas fa-share icon-right"></i></button>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <a href="http://scistudent.eps.zu.edu.eg/(X(1)S(bhx45hm4sthi2f0tr4c11udj))/Views/StudentViews/StudentLogin" class="card-link" target="_blank">
                    <i class="fas fa-credit-card"></i>
                    <span data-translate="payFees">دفع الرسوم الدراسية</span>
                </a>
                <button class="share-button"><i class="fas fa-share icon-right"></i></button>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <a href="http://www.studentactivities.zu.edu.eg/Students/Registration/ed_login.aspx" class="card-link" target="_blank">
                    <i class="fas fa-book"></i>
                    <span data-translate="registerCourses">تسجيل المقررات الدراسية</span>
                </a>
                <button class="share-button"><i class="fas fa-share icon-right"></i></button>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <a href="http://www.studentactivities.zu.edu.eg/Students/Registration/ed_login.aspx" class="card-link" target="_blank">
                    <i class="fas fa-user"></i>
                    <span data-translate="results">النتيجة</span>
                </a>
                <button class="share-button"><i class="fas fa-share icon-right"></i></button>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <a href="http://www.militaryeducation.zu.edu.eg/Views/ED_Students/Login" class="card-link" target="_blank">
                    <i class="fas fa-user"></i>
                    <span data-translate="militaryEducation">التسجيل في التربية العسكرية</span>
                </a>
                <button class="share-button"><i class="fas fa-share icon-right"></i></button>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <a href="#" class="card-link">
                    <i class="fas fa-user"></i>
                    <span data-translate="gpaCalculator">حساب المعدل الفصلي</span>
                </a>
                <button class="share-button"><i class="fas fa-share icon-right"></i></button>
            </div>
        </div>
        
        <div class="MyName">
            <p>Created by <a href="https://www.facebook.com/AliMaherAlErian">Ali Al-3rian</a></p>
        </div>

    </div>

    <script src="./js/script.js"></script>
    <script src="./js/language.js"></script>
</body>
</html>
